<!DOCTYPE html>
<html>
    <head>
        <title>Strawberry Tunes</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="https://use.typekit.net/ayn8bfi.css">
    </head>
    <body>
        <div class="container">
            <div class="header"> 
                <div class="logo">
                     <img src="Untitled_Artwork.png" alt="strawberry mark "width="100"></a>
                </div>
            </div>
            <div class="title">
            <div class="bgimg">
                <img src="title-pic.png" alt="title picture">
            </div>
            <div class="name"> <img src="STUNES (CREAM).png" alt="strawberry mark "width="900">  
            </div>
        </div>
        
            <div class="spin">
                <div class="spinny"><img src="record-st-cat.co.png" alt="strawberry mark "width="600"></a></div>
                <div class="featured">
                    <h1>FEATURED<br>RECORDS</h1>
                </div>
                 </div>
            <div class="sleeves">
                <div class="album1"><img src="decemberist-album.png" alt="Decemberist Album"width="460"></div>
                <div class="album2"><img src="lemonade-album.png" alt="Lemonade Album"width="460"></div>
                <div class="album3"><img src="dopamine-album.png" alt="Dopamine Album"width="460"></div>
            </div>
            <div class="record">
               <div class="album4"><img src="negro-swan-album.png" alt="Negro Swan by Blood Orange  Album"width="460"></div>
                <div class="album5"><img src="glass-heart-album.png" alt="Glass heart by TENBLANK "width="460"></div>
                <div class="album6"><img src="olivia-album.png" alt="olivia album"width="460"></div> 
            </div>
            <div class="calender1">
                <h2>CALENDAR</h2>
            </div>
            <div class="chart">
                <button onclick="toggleCalendar()">Switch View</button>

                <div id="calendar">
                <img id="monthView" src="event-calendar-draft.JPEG" alt="Month View">
                <img id="weekView" src="draft-weekly-sched.JPEG" alt="Week View" style="display: none;">
            </div>
            </div>
            <div class="merch">
                <h2>MERCH</h2>
            </div>
            <div class="items">
                <div class="item1">
                    <img src="stunes-tote.png" alt="Tote Bag Merch"width="460">
                </div>
                <div class="item2">
                    <div class="img-wrap">
                     <img src="STUNESHOODIE.png" class="normal">
                    <img src="STUNESHOODIEBACK.png" class="hover">
                </div>
                </div>
                <div class="item3">
                    <img src="STUNES TEE.png" alt="Tote Bag Merch"width="460">
                </div>
            </div>
        </div>
         <script src="main.js"></script>
    </body>
</html>
